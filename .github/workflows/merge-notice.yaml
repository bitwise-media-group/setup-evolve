# Thin caller: posts a one-time comment when a PR is opened, explaining this repo
# merges via `/merge` (see merge.yaml). The reusable workflow only posts a static
# comment with a pull-requests:write token.
#
# pull_request_target (not pull_request) so the notice also reaches fork PRs; the
# elevated context is safe because the reusable workflow never checks out or runs
# PR code. No secret needed.
name: Fast-forward merge notice

on:
  pull_request_target:
    types: [opened]

# the reusable workflow comments with GITHUB_TOKEN; grant just that
permissions:
  pull-requests: write

jobs:
  notice:
    uses: bitwise-media-group/github-workflows/.github/workflows/merge-notice.yaml@ef97ca56a3a90f9f35556402e0c7478307edcbb9 # v3.0.0
    with:
      pr-number: ${{ github.event.pull_request.number }}
