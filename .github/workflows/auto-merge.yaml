# Thin caller: the set-and-forget auto-merge flow lives in the shared reusable
# workflow — the companion to merge.yaml (`/merge` merges now, `/auto-merge`
# merges when ready). A maintainer arms a PR once (comments `/auto-merge` or adds
# the `auto-merge` label) and it is fast-forwarded automatically as soon as it is
# approved and every required check is green, preserving each commit's signature
# via the same ff-merge action as `/merge`. Remove the label to cancel.
#
# All four triggers are required, each handled by one job in the reusable
# workflow: issue_comment + pull_request(labeled) arm the PR;
# pull_request_review(approved) and workflow_run(completed) attempt the merge when
# the state changes. The `workflows:` list names every workflow that must pass
# before merging — this repo's CI and CodeQL; whichever finishes last triggers the
# attempt, and ff-merge re-verifies all required checks. None of these run PR code.
#
# Fork PRs: only issue_comment + workflow_run get base-context secrets on a fork,
# so the labeled / review jobs are gated to same-repo PRs in the reusable workflow
# — arm a fork PR with the `/auto-merge` comment instead. Requires branch
# protection that requires PR review (so an approval sets the review decision).
#
# Org prerequisites (one-time, see bitwise-media-group/ff-merge): the
# FF_MERGE_CLIENT_ID variable + FF_MERGE_PRIVATE_KEY secret, and the "FF Merge"
# App installed on this repo and in main's ruleset bypass list — the same App as
# the /merge flow.
name: Auto-merge

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  workflow_run:
    # every workflow that must be green before an armed PR merges
    workflows: ["Continuous integration", "CodeQL analysis"]
    types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  auto-merge:
    uses: bitwise-media-group/github-workflows/.github/workflows/auto-merge.yaml@077a003a620f49bd0062c73fc761dbea05d7fb70 # v1.1.0
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
